name: Feature request
description: Propose a new invariant helper, macro enhancement, or example.
title: "feature: "
labels:
  - enhancement
body:
  - type: input
    id: area
    attributes:
      label: Area
      placeholder: risk, agent, account_info, docs, CI
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What does this unblock for your team?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How will we know this is complete?
    validations:
      required: true
