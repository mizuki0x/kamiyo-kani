name: Kani

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 4 * * 1"

jobs:
  kani:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: model-checking/kani-github-action@v1
        with:
          kani-version: latest
          command: ./scripts/kani-ci.sh
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: kani-results
          path: kani-results
